<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Bullion – Mumbai Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --gold: #C9A84C; --bg: #13110E; --card: #1C1915; --text: #DDD5C3; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; }
    .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.4rem; }
    .status { font-size: 0.7rem; color: #3DB87A; border: 1px solid #3DB87A; padding: 4px 10px; border-radius: 20px; }
    .rate-card { background: var(--card); border-radius: 15px; padding: 25px; margin-bottom: 20px; border: 1px solid #222; }
    .label { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .price { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: #fff; margin: 10px 0; display: block; }
    .footer-note { font-size: 0.7rem; color: #666; text-align: center; margin-top: 20px; }
    .loading { opacity: 0.5; filter: blur(2px); }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">Mumbai Bullion</div>
    <div id="status" class="status">LIVE</div>
  </header>

  <div id="main-content">
    <div class="rate-card">
      <div class="label">24K Gold (10g)</div>
      <span id="p24" class="price">₹78,500</span>
    </div>

    <div class="rate-card">
      <div class="label">22K Gold (10g)</div>
      <span id="p22" class="price">₹71,950</span>
    </div>

    <div class="rate-card">
      <div class="label">18K Gold (10g)</div>
      <span id="p18" class="price">₹58,870</span>
    </div>
  </div>

  <p class="footer-note">Prices sourced from GoodReturns Mumbai. Refresh to update.</p>
</div>

<script>
  async function fetchMumbaiGold() {
    const status = document.getElementById('status');
    const content = document.getElementById('main-content');
    
    try {
      // Using AllOrigins Proxy to visit GoodReturns Mumbai page
      const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.goodreturns.in/gold-rates/mumbai.html')}`);
      const data = await response.json();
      const html = data.contents;

      // This searches the page for the first text that looks like a price (e.g., 78,500)
      const priceRegex = /(\d{2,3},\d{3})/; 
      const match = html.match(priceRegex);

      if (match) {
        const base24k = parseInt(match[0].replace(/,/g, ''));
        
        // Update the UI with real Mumbai data
        document.getElementById('p24').innerText = "₹" + (base24k * 10).toLocaleString('en-IN');
        document.getElementById('p22').innerText = "₹" + Math.round(base24k * 10 * 0.916).toLocaleString('en-IN');
        document.getElementById('p18').innerText = "₹" + Math.round(base24k * 10 * 0.75).toLocaleString('en-IN');
        
        status.innerText = "LIVE";
        content.classList.remove('loading');
      }
    } catch (err) {
      status.innerText = "REFRESH NEEDED";
      status.style.color = "#ff4444";
      status.style.borderColor = "#ff4444";
    }
  }

  window.onload = fetchMumbaiGold;
</script>

</body>
</html>
