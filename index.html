<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUMBullion Live - High Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0D0D0D; --card: #1A1A1A; --text: #E0E0E0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; padding: 20px; background: var(--card); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        header { text-align: center; margin-bottom: 25px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
        .live-tag { font-size: 10px; background: #F44336; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .rates-grid { display: flex; flex-direction: column; gap: 12px; }
        .card { background: #252525; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold); }
        .label { font-size: 14px; font-weight: 600; color: #BBB; }
        .price { font-size: 20px; font-weight: 700; color: #FFF; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; }
        .footer { margin-top: 20px; font-size: 10px; text-align: center; color: #666; line-height: 1.5; }
        #timestamp { color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">MUMBullion Live</div>
        <div class="live-tag">REAL-TIME DATA</div>
    </header>

    <div class="rates-grid">
        <div class="card"><span class="label">24KT (999)</span><span class="price" id="p24">₹--</span></div>
        <div class="card"><span class="label">22KT (916)</span><span class="price" id="p22">₹--</span></div>
        <div class="card"><span class="label">18KT (750)</span><span class="price" id="p18">₹--</span></div>
        <div class="card"><span class="label">14KT (585)</span><span class="price" id="p14">₹--</span></div>
        <div class="card"><span class="label">9KT (375)</span><span class="price" id="p9">₹--</span></div>
    </div>

    <button class="btn-whatsapp" onclick="shareOnWhatsApp()">Share on WhatsApp</button>

    <div class="footer">
        Formula: ((Spot+3)*32.1507)*FX*1.06*1.001 / 100<br>
        Purity: 22K=960/100, 18K=825/100, 14K=680/100, 9K=500/100<br>
        Next Sync (10m): <span id="timestamp">--:--:--</span>
    </div>
</div>

<script>
    const API_KEY = 'ae0c78ed4e722063cf21fc133ba2940c70db34279ca8f155837376b92e4bb4d9';
    let currentE = 0; // Final 24kt Price per 10gms

    async function fetchRates() {
        try {
            // 1. Fetch Exchange Rate (USD/INR)
            const fxRes = await fetch('https://open.er-api.com/v6/latest/USD');
            if (!fxRes.ok) throw new Error(`FX API Error: ${fxRes.status}`);
            const fxData = await fxRes.json();
            const usdInr = fxData.rates.INR;
            console.log('Exchange Rate (USD/INR):', usdInr);

            // 2. Fetch Gold Spot (USD per troy oz)
            const goldRes = await fetch('https://api.gold-api.com/price/XAU', {
                headers: { 'x-api-key': API_KEY }
            });
            if (!goldRes.ok) throw new Error(`Gold API Error: ${goldRes.status}`);
            const goldData = await goldRes.json();
            console.log('Gold API Response:', goldData);
            
            // Critical: Find the price in the response (handles different API structures)
            const xauPrice = goldData.price || 
                           (goldData.data ? goldData.data.price : null) || 
                           goldData.price_usd || 
                           (goldData.result ? goldData.result.xauusd : null);

            if (!xauPrice) throw new Error("Price not found in API response. Response structure: " + JSON.stringify(goldData));

            console.log('Gold Spot Price (USD/oz):', xauPrice);

            // --- THE COMPLETE FORMULA ---
            // Formula: ((Spot+3)*32.1507)*FX*1.06*1.001 / 100
            
            // A: Gold Price in kg (USD) - Converting from troy oz to kg
            const A = (xauPrice + 3) * 32.1507;
            console.log('Step A - Price in USD/kg:', A);
            
            // B: Gold price in INR per kg
            const B = A * usdInr;
            console.log('Step B - Price in INR/kg:', B);
            
            // C: Landed Cost (Add 6% Duty)
            const C = B * 1.06;
            console.log('Step C - Price with 6% duty (INR/kg):', C);
            
            // D: Wholesale Cost (Add 0.1% Markup)
            const D = C * 1.001;
            console.log('Step D - Price with 0.1% markup (INR/kg):', D);
            
            // E: 24kt Price per 10gms (divide by 100)
            currentE = D / 100;
            console.log('Step E - Final 24KT Price (INR per 10gms):', currentE);

            updateUI();
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            console.error("Workflow Error:", e);
            document.getElementById('timestamp').innerText = "Sync Error - Check Console";
        }
    }

    function updateUI() {
        if (!currentE) return;

        const rates = {
            p24: Math.round(currentE),
            p22: Math.round(currentE * 960 / 100),
            p18: Math.round(currentE * 825 / 100),
            p14: Math.round(currentE * 680 / 100),
            p9:  Math.round(currentE * 500 / 100)
        };

        console.log('Calculated Rates:', rates);

        for (let key in rates) {
            document.getElementById(key).innerText = `₹${rates[key].toLocaleString('en-IN')}`;
        }
    }

    function shareOnWhatsApp() {
        if (!currentE) return;
        const r = (val) => Math.round(val).toLocaleString('en-IN');
        const msg = `*MUMBullion LIVE RATES*%0A💰 *24KT:* ₹${r(currentE)}%0A✨ *916 (22K):* ₹${r(currentE * 960 / 100)}%0A💎 *750 (18K):* ₹${r(currentE * 825 / 100)}%0A🔱 *14KT:* ₹${r(currentE * 680 / 100)}%0A🔸 *9KT:* ₹${r(currentE * 500 / 100)}%0A_Mumbai Wholesale Market_`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    // Refresh every 10 minutes
    setInterval(fetchRates, 600000);
    window.onload = fetchRates;
</script>

</body>
</html>
