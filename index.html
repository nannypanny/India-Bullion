<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUMBullion Live - High Precision</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --silver: #C0C0C0; --bg: #0D0D0D; --card: #1A1A1A; --text: #E0E0E0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; padding: 20px; background: var(--card); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        header { text-align: center; margin-bottom: 15px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; }
        .live-tag { font-size: 10px; background: #F44336; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Toggle Switch Styles */
        .toggle-container { display: flex; justify-content: space-between; align-items: center; background: #252525; padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #444; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(22px); }

        .rates-grid { display: flex; flex-direction: column; gap: 10px; }
        .card { background: #252525; padding: 12px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold); }
        .card.silver { border-left-color: var(--silver); }
        .label { font-size: 14px; font-weight: 600; color: #BBB; }
        .price { font-size: 20px; font-weight: 700; color: #FFF; }
        
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; margin-top: 20px; }
        .footer { margin-top: 20px; font-size: 10px; text-align: center; color: #666; line-height: 1.5; }
        #timestamp { color: var(--gold); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">MUMBullion Live</div>
        <div class="live-tag">REAL-TIME DATA</div>
    </header>

    <div class="toggle-container">
        <span class="label" style="color: #FFF;">Include 3% GST</span>
        <label class="switch">
            <input type="checkbox" id="gstToggle" onchange="updateUI()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="rates-grid">
        <div class="card"><span class="label">Gold 24KT (999)</span><span class="price" id="p24">₹--</span></div>
        <div class="card"><span class="label">Gold 22KT (916)</span><span class="price" id="p22">₹--</span></div>
        <div class="card"><span class="label">Gold 18KT (750)</span><span class="price" id="p18">₹--</span></div>
        <div class="card silver"><span class="label">Silver (999) Per KG</span><span class="price" id="pSilver">₹--</span></div>
    </div>

    <button class="btn-whatsapp" onclick="shareOnWhatsApp()">Share on WhatsApp</button>

    <div class="footer">
        <span id="gstNote">All Rates are Exc. 3% GST</span><br>
        Physical delivery rates (Mumbai Market)<br>
        Next Sync (10m): <span id="timestamp">--:--:--</span>
    </div>
</div>

<script>
    const API_KEY = 'ae0c78ed4e722063cf21fc133ba2940c70db34279ca8f155837376b92e4bb4d9';
    let goldBase = 0;   // 24kt per 10g (No GST)
    let silverBase = 0; // Silver per 1kg (No GST)

    async function fetchRates() {
        try {
            // 1. Fetch Exchange Rate
            const fxRes = await fetch('https://open.er-api.com/v6/latest/USD');
            const fxData = await fxRes.json();
            const usdInr = fxData.rates.INR;

            // 2. Fetch Gold and Silver Spot
            const goldRes = await fetch('https://api.gold-api.com/price/XAU');
            const silverRes = await fetch('https://api.gold-api.com/price/XAG');
            
            const gData = await goldRes.json();
            const sData = await silverRes.json();

            // --- CALCULATIONS ---
            
            // Gold Logic (Per 10g)
            // ((Spot+3)*32.1507)*FX*1.06*1.001 / 100
            const goldKgUsd = (gData.price + 3) * 32.1507;
            goldBase = (goldKgUsd * usdInr * 1.06 * 1.001) / 100;

            // Silver Logic (Per 1kg)
            // Formula: (Spot + 0.50 premium) * 32.1507 * FX * 1.06 (Duty) * 1.001 (Markup)
            const silverKgUsd = (sData.price + 0.50) * 32.1507;
            silverBase = (silverKgUsd * usdInr * 1.06 * 1.001);

            updateUI();
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            console.error("Fetch Error:", e);
        }
    }

    function updateUI() {
        if (!goldBase || !silverBase) return;

        const isGst = document.getElementById('gstToggle').checked;
        const multiplier = isGst ? 1.03 : 1;
        
        document.getElementById('gstNote').innerText = isGst ? "All Rates include 3% GST" : "All Rates are Exc. 3% GST";

        const rates = {
            p24: Math.round((goldBase * multiplier) + 500),
            p22: Math.round((goldBase * 0.96) * multiplier), // Standard 91.6% purity
            p18: Math.round((goldBase * 0.83) * multiplier),
            pSilver: Math.round(silverBase * multiplier)
        };

        for (let id in rates) {
            document.getElementById(id).innerText = `₹${rates[id].toLocaleString('en-IN')}`;
        }
    }

    function shareOnWhatsApp() {
        const isGst = document.getElementById('gstToggle').checked;
        const gstText = isGst ? "(Inc. 3% GST)" : "(Excl. GST)";
        const r = (id) => document.getElementById(id).innerText;

        const msg = `*MUMBullion LIVE RATES* ${gstText}%0A💰 *24KT:* ${r('p24')}%0A✨ *22KT:* ${r('p22')}%0A💎 *18KT:* ${r('p18')}%0A🥈 *Silver:* ${r('pSilver')}%0A_Wholesale Market Rates_`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    setInterval(fetchRates, 600000);
    window.onload = fetchRates;
</script>

</body>
</html>
