<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Gold Tracker - Business Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0D0D0D; --card: #1A1A1A; --text: #E0E0E0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
        
        .tax-control { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 14px 18px; border-radius: 14px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .switch { position: relative; display: inline-block; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(24px); }
        .tax-label { font-size: 0.85rem; font-weight: 600; color: #888; }
        .tax-label.active { color: #FFF; }

        .card { background: var(--card); border-radius: 16px; padding: 22px; margin-bottom: 14px; border: 1px solid #2A2A2A; position: relative; }
        .card::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--gold); }
        .label { font-size: 0.7rem; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .price-display { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #FFF; margin: 2px 0; }
        .unit { font-size: 0.75rem; color: #666; font-weight: 500; }
        
        .footer { text-align: center; font-size: 0.7rem; color: #555; margin-top: 25px; line-height: 1.6; }
        #timestamp { color: var(--gold); font-weight: 600; }
        .live-tag { color: #4CAF50; font-weight: 700; font-size: 0.6rem; border: 1px solid #4CAF50; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">MUMBAI GOLD LIVE</div>
        <div class="live-tag">SYNCED</div>
    </header>

    <div class="tax-control">
        <span id="taxStatusLabel" class="tax-label">Include 3% GST</span>
        <label class="switch">
            <input type="checkbox" id="taxToggle" onchange="updateUI()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <div class="label">24KT Gold (99.9)</div>
        <div id="p24" class="price-display">₹ --,---</div>
        <div class="unit">Rate per 10 Grams (+4.75% Premium)</div>
    </div>

    <div class="card">
        <div class="label">22KT Gold (96% Value)</div>
        <div id="p22" class="price-display">₹ --,---</div>
        <div class="unit">Calculation: 24KT Rate × 96%</div>
    </div>

    <div class="card">
        <div class="label">18KT Gold (82% Value)</div>
        <div id="p18" class="price-display">₹ --,---</div>
        <div class="unit">Calculation: 24KT Rate × 82%</div>
    </div>

    <div class="footer">
        Reference: GoldAPI.io • Standard Mumbai Bullion<br>
        Last Updated: <span id="timestamp">--:--:--</span>
    </div>
</div>

<script>
    const MY_API_KEY = 'goldapi-3j1fsmmvn1osn-io';
    let rawGlobalPrice = 0;

    async function fetchLiveRates() {
        try {
            const response = await fetch("https://www.goldapi.io/api/XAU/INR", {
                method: 'GET',
                headers: { "x-access-token": MY_API_KEY, "Content-Type": "application/json" }
            });
            const data = await response.json();
            
            // Base conversion from Ounce to 1 Gram
            rawGlobalPrice = data.price / 31.1035;
            
            updateUI();
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            console.error("Fetch error", e);
        }
    }

    function updateUI() {
        if (!rawGlobalPrice) return;

        const isGstOn = document.getElementById('taxToggle').checked;
        const taxLabel = document.getElementById('taxStatusLabel');
        
        // 1. Calculate the New Base (Rate + 4.75%)
        const baseWithPremium = rawGlobalPrice * 1.0475;
        
        // 2. Add 3% GST only if toggle is ON
        const finalPricePerGram = isGstOn ? (baseWithPremium * 1.03) : baseWithPremium;
        
        // 3. 24KT Rate for 10 Grams
        const p24 = Math.round(finalPricePerGram * 10);
        
        // 4. Custom Purity Calculations as requested:
        // 22kt = 24kt rate x 96%
        // 18kt = 24kt rate x 82%
        const p22 = Math.round(p24 * 0.96);
        const p18 = Math.round(p24 * 0.82);

        // Update UI
        document.getElementById('p24').innerText = "₹" + p24.toLocaleString('en-IN');
        document.getElementById('p22').innerText = "₹" + p22.toLocaleString('en-IN');
        document.getElementById('p18').innerText = "₹" + p18.toLocaleString('en-IN');

        taxLabel.className = isGstOn ? "tax-label active" : "tax-label";
    }

    window.onload = fetchLiveRates;
</script>

</body>
</html>
