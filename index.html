<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Gold Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0D0D0D; --card: #1A1A1A; --text: #E0E0E0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
        
        /* Toggle Switch */
        .tax-control { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--gold); }
        input:checked + .slider:before { transform: translateX(22px); }
        .tax-label { font-size: 0.85rem; font-weight: 600; color: #AAA; }
        .tax-label.active { color: var(--gold); }

        .card { background: var(--card); border-radius: 16px; padding: 22px; margin-bottom: 14px; border: 1px solid #2A2A2A; position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--gold); }
        .label { font-size: 0.7rem; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
        .price-display { font-family: 'Playfair Display', serif; font-size: 2.4rem; color: #FFF; margin: 2px 0; }
        .unit { font-size: 0.75rem; color: #777; font-weight: 500; }
        
        .footer { text-align: center; font-size: 0.7rem; color: #555; margin-top: 25px; line-height: 1.6; }
        #timestamp { color: var(--gold); }
        .live-tag { color: #4CAF50; font-weight: 700; font-size: 0.6rem; border: 1px solid #4CAF50; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">MUMBAI LIVE BULLION</div>
        <div class="live-tag">LIVE</div>
    </header>

    <div class="tax-control">
        <span id="taxStatusLabel" class="tax-label">Show Mumbai Retail (Incl. GST)</span>
        <label class="switch">
            <input type="checkbox" id="taxToggle" checked onchange="updateUI()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <div class="label">24K Gold (Pure)</div>
        <div id="p24" class="price-display">₹ --,---</div>
        <div class="unit">Market Rate per 10 Grams</div>
    </div>

    <div class="card">
        <div class="label">22K Gold (916 Hallmark)</div>
        <div id="p22" class="price-display">₹ --,---</div>
        <div class="unit">Standard Jewellery (10g)</div>
    </div>

    <div class="card">
        <div class="label">18K Gold (750 Hallmark)</div>
        <div id="p18" class="price-display">₹ --,---</div>
        <div class="unit">Diamond Jewellery Base (10g)</div>
    </div>

    <div class="footer">
        Data: GoldAPI.io • Standard Indian Purity<br>
        Last Update: <span id="timestamp">--:--:--</span>
    </div>
</div>

<script>
    const MY_API_KEY = 'goldapi-3j1fsmmvn1osn-io';
    let globalBasePrice = 0;

    async function fetchLiveRates() {
        try {
            const response = await fetch("https://www.goldapi.io/api/XAU/INR", {
                method: 'GET',
                headers: { "x-access-token": MY_API_KEY, "Content-Type": "application/json" }
            });
            const data = await response.json();
            
            // API returns price for 1 Troy Ounce. Convert to 1 Gram.
            globalBasePrice = data.price / 31.1035;
            
            updateUI();
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            console.error("Fetch error", e);
        }
    }

    function updateUI() {
        if (!globalBasePrice) return;

        const isTaxEnabled = document.getElementById('taxToggle').checked;
        const taxLabel = document.getElementById('taxStatusLabel');
        
        // 1. Calculate Base 10g Price
        // multiplier: 1.06 (Customs Duty) * 1.03 (GST) = approx 1.0918
        const taxMultiplier = isTaxEnabled ? 1.0918 : 1; 
        
        const current10gRate = Math.round(globalBasePrice * 10 * taxMultiplier);
        
        // 2. Purity Calculations
        const p24 = current10gRate;
        const p22 = Math.round(p24 * 0.916);
        const p18 = Math.round(p24 * 0.75);

        // 3. Update Text
        document.getElementById('p24').innerText = "₹" + p24.toLocaleString('en-IN');
        document.getElementById('p22').innerText = "₹" + p22.toLocaleString('en-IN');
        document.getElementById('p18').innerText = "₹" + p18.toLocaleString('en-IN');

        // UI styling for the label
        taxLabel.className = isTaxEnabled ? "tax-label active" : "tax-label";
    }

    window.onload = fetchLiveRates;
</script>

</body>
</html>
