<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Gold Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0D0D0D; --card: #1A1A1A; --text: #E0E0E0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); font-weight: 700; letter-spacing: 1px; }
        
        .tax-control { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 14px 18px; border-radius: 14px; margin-bottom: 20px; border: 1px solid #333; }
        .switch { position: relative; display: inline-block; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(24px); }
        .tax-label { font-size: 0.85rem; font-weight: 600; color: #888; }
        .tax-label.active { color: #FFF; }

        .card { background: var(--card); border-radius: 16px; padding: 22px; margin-bottom: 14px; border: 1px solid #2A2A2A; position: relative; }
        .card::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--gold); }
        .label { font-size: 0.7rem; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .price-display { font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #FFF; margin: 2px 0; }
        .unit { font-size: 0.75rem; color: #666; font-weight: 500; }
        
        .share-btn { width: 100%; background: #25D366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; transition: transform 0.2s; }
        .share-btn:active { transform: scale(0.98); }
        
        .footer { text-align: center; font-size: 0.7rem; color: #555; margin-top: 25px; line-height: 1.6; }
        #timestamp { color: var(--gold); font-weight: 600; }
        .live-tag { color: #4CAF50; font-weight: 700; font-size: 0.6rem; border: 1px solid #4CAF50; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="brand">MUMBAI GOLD LIVE</div>
        <div class="live-tag">SYNCED</div>
    </header>

    <div class="tax-control">
        <span id="taxStatusLabel" class="tax-label">Include 3% GST</span>
        <label class="switch">
            <input type="checkbox" id="taxToggle" onchange="updateUI()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <div class="label">24KT GOLD (99.9)</div>
        <div id="p24" class="price-display">₹ --,---</div>
        <div class="unit">Rate per 10 Grams</div>
    </div>

    <div class="card">
        <div class="label">22KT GOLD (91.6)</div>
        <div id="p22" class="price-display">₹ --,---</div>
        <div class="unit">Standard Jewellery (10g)</div>
    </div>

    <div class="card">
        <div class="label">18KT GOLD (75.0)</div>
        <div id="p18" class="price-display">₹ --,---</div>
        <div class="unit">Diamond Jewellery Base (10g)</div>
    </div>

    <button class="share-btn" onclick="shareToWhatsApp()">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
        Share Rates on WhatsApp
    </button>

    <div class="footer">
        Reference: GoldAPI.io • Standard Mumbai Bullion<br>
        Last Updated: <span id="timestamp">--:--:--</span>
    </div>
</div>

<script>
    const MY_API_KEY = 'goldapi-3j1fsmmvn1osn-io';
    let rawGlobalPrice = 0;
    let currentP24 = 0, currentP22 = 0, currentP18 = 0;

    async function fetchLiveRates() {
        try {
            const response = await fetch("https://www.goldapi.io/api/XAU/INR", {
                method: 'GET',
                headers: { "x-access-token": MY_API_KEY, "Content-Type": "application/json" }
            });
            const data = await response.json();
            
            // Ounce to 1 Gram conversion
            rawGlobalPrice = data.price / 31.1035;
            
            updateUI();
            document.getElementById('timestamp').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            console.error("Fetch error", e);
        }
    }

    function updateUI() {
        if (!rawGlobalPrice) return;
        const isGstOn = document.getElementById('taxToggle').checked;
        const taxLabel = document.getElementById('taxStatusLabel');
        
        // Base Calculation (Global Rate + 4.73% Premium)
        const baseWithPremium = rawGlobalPrice * 1.0473;
        
        // Add 3% GST only if toggle is ON
        const finalPricePerGram = isGstOn ? (baseWithPremium * 1.03) : baseWithPremium;
        
        // 24KT Rate for 10 Grams
        currentP24 = Math.round(finalPricePerGram * 10);
        
        // Custom Purity Calculations
        currentP22 = Math.round(currentP24 * 0.96); // 96% of 24KT
        currentP18 = Math.round(currentP24 * 0.82); // 82% of 24KT

        // Update Text
        document.getElementById('p24').innerText = "₹" + currentP24.toLocaleString('en-IN');
        document.getElementById('p22').innerText = "₹" + currentP22.toLocaleString('en-IN');
        document.getElementById('p18').innerText = "₹" + currentP18.toLocaleString('en-IN');

        taxLabel.className = isGstOn ? "tax-label active" : "tax-label";
    }

    function shareToWhatsApp() {
        if (!currentP24) return;
        const isGstOn = document.getElementById('taxToggle').checked;
        const gstStatus = isGstOn ? "(Incl. 3% GST)" : "(Excl. GST)";
        
        const message = `*LIVE MUMBAI GOLD RATES* %0A----------------------------%0A💰 *24KT (99.9):* ₹${currentP24.toLocaleString('en-IN')} %0A✨ *22KT (91.6):* ₹${currentP22.toLocaleString('en-IN')} %0A💎 *18KT (75.0):* ₹${currentP18.toLocaleString('en-IN')} %0A----------------------------%0A*Note:* Rates per 10 grams ${gstStatus}. %0A_Updated: ${new Date().toLocaleTimeString()}_`;
        
        window.open(`https://wa.me/?text=${message}`, '_blank');
    }

    window.onload = fetchLiveRates;
</script>

</body>
</html>
