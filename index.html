<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>India Bullion – Live Gold Rates</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #C9A84C; --dark-bg: #13110E; --card-bg: #1C1915;
      --text: #DDD5C3; --green: #3DB87A;
    }
    body { font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
    header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 5%; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(201,168,76,0.15); }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; }
    .status-pill { font-size: 0.65rem; padding: 5px 12px; border-radius: 20px; border: 1px solid #333; letter-spacing: 1px; }
    .status-pill.live { color: var(--green); border-color: var(--green); box-shadow: 0 0 10px rgba(61,184,122,0.2); }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 90%; max-width: 1100px; margin: 40px auto; }
    .rate-card { background: var(--card-bg); padding: 35px; border-radius: 18px; border: 1px solid rgba(201,168,76,0.08); position: relative; }
    .price-value { font-family: 'Playfair Display', serif; font-size: 3.2rem; color: #fff; display: block; margin: 12px 0; }
    .skeleton { height: 60px; background: #2A2620; border-radius: 8px; animation: pulse 1.5s infinite; color: transparent !important; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 0.3; } 100% { opacity: 0.6; } }
    .label { color: var(--gold); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
    .sub-label { font-size: 0.75rem; color: #666; }
  </style>
</head>
<body>

<header>
  <div class="logo">India Bullion</div>
  <div id="statusPill" class="status-pill">STATUS: CONNECTING...</div>
</header>

<main class="cards-grid">
  <div class="rate-card">
    <div class="label">24K Pure Gold</div>
    <span id="c24k" class="price-value skeleton">00,000</span>
    <div class="sub-label">Live from Groww (Mumbai / 10g)</div>
  </div>
  <div class="rate-card">
    <div class="label">22K (916 Hallmark)</div>
    <span id="c916" class="price-value skeleton">00,000</span>
    <div class="sub-label">Calculated: 24K × 0.916</div>
  </div>
  <div class="rate-card">
    <div class="label">18K (750 Hallmark)</div>
    <span id="c750" class="price-value skeleton">00,000</span>
    <div class="sub-label">Calculated: 24K × 0.75</div>
  </div>
</main>

<script>
  async function loadRates() {
    const proxy = "https://api.allorigins.win/get?url=";
    const target = encodeURIComponent("https://groww.in/gold-rates/gold-rate-today-in-mumbai");
    
    try {
      const response = await fetch(proxy + target);
      const data = await response.json();
      const html = data.contents;
      
      // Better extraction logic: We look for the first large currency pattern like ₹1,23,456
      const priceMatch = html.match(/₹\s?(\d{1,2},?\d{2},?\d{3})/);
      
      if (priceMatch) {
        const rawPrice = priceMatch[1];
        const baseRate = parseInt(rawPrice.replace(/,/g, ''));

        document.getElementById('c24k').innerText = "₹" + baseRate.toLocaleString('en-IN');
        document.getElementById('c916').innerText = "₹" + Math.round(baseRate * 0.916).toLocaleString('en-IN');
        document.getElementById('c750').innerText = "₹" + Math.round(baseRate * 0.75).toLocaleString('en-IN');

        document.getElementById('statusPill').innerText = "STATUS: LIVE";
        document.getElementById('statusPill').classList.add('live');
        document.querySelectorAll('.price-value').forEach(el => el.classList.remove('skeleton'));
      } else {
        throw new Error("Price pattern not found");
      }
      
    } catch (e) {
      console.error("Fetch failed", e);
      document.getElementById('statusPill').innerText = "STATUS: UPDATE FAILED";
      // Fallback to a realistic rate if the website is completely down
      const fallback = 142986; 
      document.getElementById('c24k').innerText = "₹" + fallback.toLocaleString('en-IN');
      document.querySelectorAll('.price-value').forEach(el => el.classList.remove('skeleton'));
    }
  }
  window.onload = loadRates;
</script>
</body>
</html>
